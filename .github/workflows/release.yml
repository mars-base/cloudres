name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        env:
          CGO_ENABLED: '0'
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
          LDFLAGS="-X main.version=${VERSION} -X main.buildTime=${BUILD_TIME}"

          mkdir -p dist

          GOOS=linux   GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/cloudres-linux-amd64       ./cmd/cloudres
          GOOS=linux   GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/cloudres-linux-arm64       ./cmd/cloudres
          GOOS=darwin  GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/cloudres-darwin-amd64      ./cmd/cloudres
          GOOS=darwin  GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/cloudres-darwin-arm64      ./cmd/cloudres
          GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/cloudres-windows-amd64.exe ./cmd/cloudres

          cd dist && sha256sum * > checksums.txt

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
